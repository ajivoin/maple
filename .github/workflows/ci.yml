name: CI

on:
  push:
    branches: ['**']
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  ci:
    name: Lint, Format, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npx prettier --check "{src,scripts}/**/*.ts"

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
